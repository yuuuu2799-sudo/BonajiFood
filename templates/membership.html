<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root {
            --dark-prime: #0a192f;
            --accent: #64ffda;
            --glass: rgba(255, 255, 255, 0.1); }

        body {
            background: var(--dark-prime);
            font-family: 'Poppins', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box; 
        }
        
        .auth-container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            box-sizing: border-box; 
        }

        .tab-btns {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px; 
        }
        .tab-btns button {
            background: none;
            border: none;
            color: #8892b0;
            font-size: 18px;
            cursor: pointer;
            padding: 5px 10px;
            border-bottom: 2px solid transparent;
            transition: 0.3s; 
        }

        .tab-btns button.active {
            color: var(--accent);
            border-bottom-color: var(--accent); 
        }
        
        input, textarea {
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            background: rgba(0,0,0,0.2); 
            border: 1px solid #233554; 
            border-radius: 5px; 
            color: white; 
            box-sizing: border-box; 
            font-size: 16px;
        }

        .payment-info {
            background: #112240; 
            padding: 15px; 
            border-radius: 8px; 
            font-size: 13px; 
            margin: 15px 0; 
            border-left: 4px solid var(--accent); 
            line-height: 1.6;
        }

        .btn-auth {
            width: 100%; 
            padding: 15px; 
            background: var(--accent); 
            color: var(--dark-prime); 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 10px;
            font-size: 16px; 
        }

        .btn-auth:hover {
            background: #45c7a9; 
            transform: translateY(-2px); 
        }

        .hidden { display: none; }

        /* Mobile Specific Adjustments */
    @media (max-width: 480px) {
        .auth-container {
            padding: 20px; /* Even less padding on very small phones */
        }
        .tab-btns button {
        font-size: 16px;
        }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="tab-btns">
            <button id="loginTab" class="active" onclick="toggleAuth('login')">Login</button>
            <button id="regTab" onclick="toggleAuth('reg')">Register</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm">
            <input type="email" id="logEmail" placeholder="Email Address" required>
            <input type="password" id="logPass" placeholder="Password" required>
            <button type="submit" class="btn-auth">Access Profile</button>
        </form>

        <!-- Register Form -->
        <form id="regForm" class="hidden">
            <input type="text" id="regName" placeholder="Full Name" required>
            <input type="text" id="regUser" placeholder="Username" required>
            <input type="tel" id="regMobile" placeholder="Mobile Number" required>
            <input type="email" id="regEmail" placeholder="Email" required>
            <input type="password" id="regPass" placeholder="Create Password" required>
            
            <div class="payment-info">
                <strong>Pro Membership: 499 BDT</strong><br>
                Bkash/Nagad (Send Money): 01755555555<br>
                টাকা পাঠিয়ে ট্রানজেকশন আইডি নিচে দিন।
            </div>
            <input type="text" id="regTxID" placeholder="Transaction ID (TxID)" required>
            
            <button type="submit" class="btn-auth">Register & Pay</button>
        </form>
    </div>

    <script>
        function toggleAuth(type) {
            document.getElementById('loginForm').classList.toggle('hidden', type === 'reg');
            document.getElementById('regForm').classList.toggle('hidden', type === 'login');
            document.getElementById('loginTab').classList.toggle('active', type === 'login');
            document.getElementById('regTab').classList.toggle('active', type === 'reg');
        }

        // Add AJAX Fetch calls here to connect to /register and /login routes

        // Function to handle Login
document.getElementById('loginForm').onsubmit = async function(e) {
    e.preventDefault();
    const email = document.getElementById('logEmail').value;
    const pass = document.getElementById('logPass').value;

    const response = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ Email: email, Password: pass })
    });

    const result = await response.json();
    if (result.status === "success") {
        window.location.href = "/dashboard"; // Redirect to dashboard on success
    } else {
        alert("Login Failed: " + (result.message || "Invalid Email or Password"));
    }
};

// Function to handle Registration
document.getElementById('regForm').onsubmit = async function(e) {
    e.preventDefault();
    const regData = {
        FullName: document.getElementById('regName').value,
        Username: document.getElementById('regUser').value,
        Mobile: document.getElementById('regMobile').value,
        Email: document.getElementById('regEmail').value,
        Password: document.getElementById('regPass').value,
        TxID: document.getElementById('regTxID').value
    };

    const response = await fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(regData)
    });

    const result = await response.text();
    if (result.trim() === "Success") {
        alert("Registration Successful! Please Login.");
        location.reload(); // Reload to show login form
    } else {
        alert(result); // Shows error like "Already registered"
    }
};
    </script>
</body>
</html>
